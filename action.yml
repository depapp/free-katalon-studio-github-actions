name: 'Free Katalon Studio'
description: 'Execute Katalon Studio project on Github Actions with No Cost'
inputs:
      version:
            description: 'Which version of Katalon Studio to run'
            required: true
            default: '9.6.0'
            
      projectPath:
            description: 'Where the Katalon Studio project is checked out'
            required: true
            default: '${{ github.workspace }}'
            
      args:
            description: 'What arguments to run Katalon Studio project'
            required: true
            default: ''

runs:
      using: 'node20'
      main: 'index.js'
